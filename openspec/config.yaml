schema: spec-driven

# Project context (github)

context: |
    Tech stack: TypeScript, React, Node.js
    Monorepo with npm workspaces: backend, web
    Architecture: hexagonal architecture
    Layers: domain -> application -> infrastructure
    Web: React 19, TypeScript 5, Vite 7
    Testing: Jest (backend), Vitest (web)
    Project guidelines (source of truth): All artifact creation and implementation must read and follow the guidelines described in ./github
    - ./.github/copilot-instructions.md - Respository structure, core practices for all artifacts
    - ./.github/skills/backend-hexagonal - apps/backend/src/domain, application, infrastructure)
    - ./.github/skills/frontend-patterns - Architectural and design patterns for frontend development
    - ./.github/skills/react-best-practices - apps/web/src
    - ./.github/skills/vercel-composition-patterns -  apps/web/src
    - ./.github/instructions/conding-standards - All artifacts
    - ./.github/instructions/testing-standards - Testing strategy and patterns
    - ./.github/instructions/tdd - TDD 5-step cycle, TPP, inside-out
    - ./.github/instructions/commit-strategy - Commit message format
rules:
  proposal:
    - Keep proposal concise, focused on the "why"
    - Always include a "Non-goals" section
  specs:
    - Write scenarios in Given/When/Then format
    - Include acceptance criteria for each scenario
    - Include edge cases and error scenarios
  design:
    - Follow hexagonal architecture layers
  tasks:
    - "Notice the user which skill, rule, or instruction is being applied in each task. Add an emoji to make it more visual and easy to understand."
    - "Tasks with behavior use TDD: REASON -> RED -> GREEN -> REFACTOR -> RE-EVALUATE"
    - "Order inside-out: domain -> application -> infrastructure"
    - "Run `npm run format:fix` on all code changes"